<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Brand Mention Tracker</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- ── Sidebar ── -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">LLM Tracker</div>
        <div class="logo-sub">Brand Intelligence</div>
      </div>
    </div>
  </div>

  <div class="sidebar-nav">

    <!-- Core -->
    <div class="nav-section">
      <span class="nav-label">Core</span>
      <div class="nav-item active" data-module="brand-tracker" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        Brand Tracker
      </div>
      <div class="nav-item" data-module="analytics" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </span>
        Analytics
      </div>
    </div>

    <!-- Intelligence -->
    <div class="nav-section">
      <span class="nav-label">Intelligence</span>
      <div class="nav-item" data-module="competitors" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        Competitors
      </div>
      <div class="nav-item" data-module="keywords" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        Keywords
      </div>
      <div class="nav-item" data-module="sentiment" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 13s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
        </span>
        Sentiment
      </div>
    </div>

    <!-- Workflow -->
    <div class="nav-section">
      <span class="nav-label">Workflow</span>
      <div class="nav-item" data-module="alerts" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </span>
        Alerts
        <span class="nav-badge" id="sidebar-alerts-badge">3</span>
      </div>
      <div class="nav-item" data-module="reports" onclick="App.navigate(this.dataset.module)">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            <path d="M10 9H8"/>
            <path d="M16 13H8"/>
            <path d="M16 17H8"/>
          </svg>
        </span>
        Reports
        <span class="nav-badge-blue">New</span>
      </div>
    </div>

  </div><!-- /.sidebar-nav -->

  <div class="sidebar-footer">
    <div class="nav-item" data-module="settings" onclick="App.navigate(this.dataset.module)">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </span>
      Settings
    </div>
  </div>
</nav>

<!-- ── App right ── -->
<div class="app-right">

  <!-- Topbar -->
  <header class="topbar">
    <span id="topbar-title" class="topbar-title">Brand Tracker</span>

    <div class="topbar-search-wrap">
      <span class="topbar-search-icon">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input type="text" id="topbar-search" class="topbar-search" placeholder="Zoek modules..." autocomplete="off" />
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>

    <div class="topbar-spacer"></div>

    <div class="topbar-actions">
      <!-- Notification button -->
      <button class="topbar-icon-btn" id="notif-btn" title="Alerts">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
        </svg>
        <span class="topbar-notif-badge" id="notif-badge">3</span>
      </button>

      <!-- Avatar -->
      <div class="topbar-avatar-wrap">
        <div class="topbar-avatar" id="topbar-avatar" title="Account">M</div>
        <div class="avatar-dropdown" id="avatar-dropdown">
          <div class="avatar-profile">
            <div class="avatar-name">Morten Muijsers</div>
            <div class="avatar-email">morten@example.com</div>
          </div>
          <div class="avatar-menu-item" data-avatar-action="settings">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            Instellingen
          </div>
          <div class="avatar-menu-item" data-avatar-action="dashboard">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Dashboard
          </div>
          <div class="avatar-menu-divider"></div>
          <div class="avatar-menu-item danger">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Uitloggen
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content (filled by JS) -->
  <main class="main" id="main-content"></main>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

</div><!-- /.app-right -->

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/modules/brand-tracker.js"></script>
<script src="js/modules/analytics.js"></script>
<script src="js/modules/competitors.js"></script>
<script src="js/modules/keywords.js"></script>
<script src="js/modules/sentiment.js"></script>
<script src="js/modules/alerts.js"></script>
<script src="js/modules/reports.js"></script>
<script src="js/modules/settings.js"></script>
<script>App.init();</script>

</body>
</html>
